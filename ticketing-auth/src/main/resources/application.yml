server:
  port: 8082

spring:
  application:
    name: ticketing-auth
  datasource:
    url: jdbc:h2:file:./data/authdb;MODE=PostgreSQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      cluster:
        nodes:
          - ${REDIS_NODE_1:127.0.0.1:6379}
          - ${REDIS_NODE_2:127.0.0.1:6379}
          - ${REDIS_NODE_3:127.0.0.1:6379}
      password: ${REDIS_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

security:
  jwt:
    secret: ${JWT_SECRET}
    algorithm: HmacSHA256
    access-ttl-minutes: 30
    refresh-ttl-days: 7

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
