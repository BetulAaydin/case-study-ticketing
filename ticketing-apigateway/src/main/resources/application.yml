server:
  port: 8080

spring:
  application:
    name: ticketing-apigateway
  data:
    redis:
      cluster:
        nodes:
          - ${REDIS_NODE_1:127.0.0.1:6379}
          - ${REDIS_NODE_2:127.0.0.1:6379}
          - ${REDIS_NODE_3:127.0.0.1:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/auth/**
              filters:
                - RewritePath=/api(?<segment>/?.*), ${segment}

            - id: ticketing-public
              uri: http://localhost:8081
              predicates:
                - Path=/api/events/public/**
                - Method=GET
              filters:
                - RewritePath=/api(?<segment>/?.*), ${segment}

            - id: ticketing-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/events/**,/api/reservations/**
              filters:
                - RewritePath=/api(?<segment>/?.*), ${segment}

security:
  jwt:
    secret: ${JWT_SECRET}
    algorithm: HmacSHA256
  rate-limit:
    enabled: true
    window-seconds: 60
    login-max-requests: 5
    authenticated-max-requests: 100
    anonymous-max-requests: 50

ticketing:
  gateway:
    shared-secret: ${GATEWAY_SHARED_SECRET:ticketing-local-gateway-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info
